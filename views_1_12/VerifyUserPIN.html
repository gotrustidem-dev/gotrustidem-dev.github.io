<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <title>驗證使用者金鑰</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">

    <script src="../utils/cbor.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../utils/showMessage.js"></script>
    <script src="../utils/response.js"></script>
    <script src="../utils/PKIoverFIDO_1_12.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .card h1 {
            color: #2c3e50;
            font-size: 1.6em;
            margin-bottom: 8px;
        }

        .card .icon-top {
            font-size: 3em;
            margin-bottom: 16px;
            display: block;
        }

        .btn-verify {
            margin-top: 28px;
            width: 100%;
            padding: 16px 0;
            font-size: 1.1em;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 16px rgba(52, 152, 219, 0.4);
        }
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(52, 152, 219, 0.5); }
        .btn-verify:active { transform: translateY(0); }
        .btn-verify:disabled { opacity: 0.6; cursor: default; transform: none; box-shadow: none; }

        .result {
            margin-top: 28px;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.15em;
            font-weight: 700;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s, transform 0.3s;
        }
        .result.show { opacity: 1; transform: translateY(0); }
        .result.ok   { background: #eafaf1; color: #1e8449; }
        .result.fail { background: #fce9e6; color: #c0341d; }
        .result .result-icon { font-size: 1.6em; display: block; margin-bottom: 6px; }
        .result .result-sub { font-size: 0.7em; font-weight: 400; margin-top: 8px; color: inherit; opacity: 0.85; word-break: break-all; }

        .note {
            margin-top: 28px;
            padding: 16px 18px;
            background: #f4f6fb;
            border-left: 4px solid #3498db;
            border-radius: 8px;
            text-align: left;
            font-size: 0.82em;
            line-height: 1.7;
            color: #4a5568;
        }
        .note .note-title { font-weight: 700; color: #2c3e50; margin-bottom: 6px; display: block; }
        .note ul { margin: 0; padding-left: 18px; }
        .note li { margin-bottom: 4px; }
    </style>
</head>

<body>
    <div class="card">
        <span class="icon-top">🔐</span>
        <h1>驗證使用者金鑰</h1>

        <button class="btn-verify" id="btn_verify">驗證使用者金鑰</button>

        <div class="result" id="result"></div>

        <div class="note">
            <span class="note-title">說明</span>
            <ul>
                <li>本網頁使用標準 FIDO 功能，讓使用者驗證預設 PIN 是否正確。</li>
                <li>密碼驗證失敗仍會減少剩餘嘗試次數。</li>
                <li>無論密碼驗證成功與否，都不會影響 PKI 的初始化與佔用載具空間。</li>
            </ul>
        </div>
    </div>

    <script>
        document.getElementById('btn_verify').addEventListener('click', async function () {
            var btn = this;
            var result = document.getElementById('result');
            result.classList.remove('show', 'ok', 'fail');

            var challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);
            var userId = new Uint8Array(16);
            window.crypto.getRandomValues(userId);

            var publicKey = {
                challenge: challenge,
                rp: { name: 'GoTrustID Inc.', id: location.hostname },
                user: {
                    id: userId,
                    name: 'verify-user-pin@example.com',
                    displayName: 'Verify USER PIN'
                },
                pubKeyCredParams: [
                    { type: 'public-key', alg: -7 },    // ES256
                    { type: 'public-key', alg: -257 }   // RS256
                ],
                authenticatorSelection: {
                    authenticatorAttachment: 'cross-platform', // roaming authenticator：外接 USB/NFC 金鑰
                    residentKey: 'discouraged',                // 不要求 resident key
                    requireResidentKey: false,
                    userVerification: 'required'               // 觸發 USER PIN 驗證
                },
                attestation: 'none',
                timeout: 120000
            };

            console.log('create publicKey options', publicKey);

            function showResult(ok, main, sub) {
                result.className = 'result show ' + (ok ? 'ok' : 'fail');
                result.innerHTML = '<span class="result-icon">' + (ok ? '✓' : '✗') + '</span>' + main +
                    (sub ? '<div class="result-sub">' + sub + '</div>' : '');
            }

            btn.disabled = true;
            try {
                var cred = await navigator.credentials.create({ publicKey: publicKey });
                console.log('credential', cred);

                var uvVerified = false;
                try {
                    var attObj = CBOR.decode(cred.response.attestationObject);
                    var authData = parseAuthData(attObj.authData);
                    uvVerified = !!(authData.flags && authData.flags.uv);
                } catch (e) {
                    console.log('parse authData failed', e);
                }

                if (uvVerified) {
                    showResult(true, '使用者金鑰驗證成功');
                } else {
                    showResult(false, '使用者金鑰驗證失敗', '未完成使用者驗證 (UV = 0)');
                }
            } catch (error) {
                console.log('FAIL', error);
                showResult(false, '使用者金鑰驗證失敗', (error && error.message) ? error.message : String(error));
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
