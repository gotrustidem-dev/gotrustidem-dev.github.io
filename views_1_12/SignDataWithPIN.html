<!DOCTYPE html>
<html>

<head>
    <title>GoTrustIdem - Sign Data With PIN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">

    <script src="../utils/cbor.js"></script>

    <style>

<body>
    <h3>Sign Data With PIN (ECDH encrypted PIN)</h3>
    <p style="text-align: center; color: gray; font-size: 0.9em;">
        此範例透過 ECDH 金鑰交換加密 PIN 後送出簽名指令，適用於不支援瀏覽器 PIN 彈窗的平台（如 Android）。
    </p>
    <div style="overflow-x: scroll;">
        <table style="height: auto; width: 100%;">
            <tbody>

                <tr>
                    <td style="width: 100% ;">
                        <form style="text-align: center;" id="form_token_sn" onsubmit="return false">
                            <p>
                                <label id="label_token_sn">Token Serial number (optional):</label><br>
                                <input type="text" name="token_sn" style="width: 342px; height:41px"
                                    placeholder="留空則不指定載具">
                            </p>
                        </form>
                    </td>
                </tr>

                <tr>
                    <td id="pc-td" style="width: 100% ; ">
                        <table class="center" border="1" width="600">
                            <tbody>
                                <tr>
                                    <td style="width: 385px;">
                                        <p style="text-align: center;"><b>By Index</b></p>
                                        <p>
                                            <form style="text-align: center;" id="form_index"
                                                onsubmit="return false">
                                                <label>Certificate Index:</label><br>
                                                <input type="number" name="certIndex"
                                                    style="width: 342px; height:41px" value="0">
                                            </form>
                                        </p>
                                        <form style="text-align: center;" id="form_sign_withpin_index_btn"
                                            onsubmit="return false">
                                            <button class="btn btn-primary" action="submit"
                                                style="width: 200px; height:34px;background-color: #008CBA;">Sign
                                                Data With PIN</button>
                                        </form>
                                    </td>
                                    <td style="width: 385px;">
                                        <p style="text-align: center;"><b>By Label</b></p>
                                        <p>
                                            <form style="text-align: center;" id="form_label"
                                                onsubmit="return false">
                                                <label>CKA_LABEL:</label><br>
                                                <input type="text" name="certlabel"
                                                    style="width: 342px; height:41px">
                                            </form>
                                        </p>
                                        <form style="text-align: center;" id="form_sign_withpin_label_btn"
                                            onsubmit="return false">
                                            <button class="btn btn-primary" action="submit"
                                                style="width: 200px; height:34px;background-color: #008CBA;">Sign
                                                Data With PIN</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="2" style="text-align: center;">
                                        <label>Algorithm:</label>
                                        <select id="select_alg">
                                            <option value="2" selected>ALG_RSA2048SHA256</option>
                                            <optgroup label="PKCSv1.5">
                                                <option value="1">ALG_RSA2048SHA1</option>
                                                <option value="2">ALG_RSA2048SHA256</option>
                                                <option value="3">ALG_RSA2048SHA384</option>
                                                <option value="4">ALG_RSA2048SHA512</option>
                                                <option value="5">ALG_RSA2048SHA1_PreHash</option>
                                                <option value="6">ALG_RSA2048SHA256_PreHash</option>
                                                <option value="7">ALG_RSA2048SHA384_PreHash</option>
                                                <option value="8">ALG_RSA2048SHA512_PreHash</option>
                                            </optgroup>
                                            <optgroup label="PKCS#1 PSS">
                                                <option value="9">ALG_RSA2048SHA1_PSS</option>
                                                <option value="10">ALG_RSA2048SHA256_PSS</option>
                                                <option value="11">ALG_RSA2048SHA384_PSS</option>
                                                <option value="12">ALG_RSA2048SHA512_PSS</option>
                                                <option value="13">ALG_RSA2048SHA1_PSS_PreHash</option>
                                                <option value="14">ALG_RSA2048SHA256_PSS_PreHash</option>
                                                <option value="15">ALG_RSA2048SHA384_PSS_PreHash</option>
                                                <option value="16">ALG_RSA2048SHA512_PSS_PreHash</option>
                                            </optgroup>
                                            <optgroup label="ECDSA">
                                                <option value="17">ECDSA_SHA</option>
                                                <option value="18">ECDSA_SHA256</option>
                                                <option value="19">ECDSA_SHA384</option>
                                                <option value="20">ECDSA_SHA512</option>
                                            </optgroup>
                                        </select>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </td>
                </tr>

                <tr>
                    <td style="width: 100%;">
                        <p style="text-align: center;">
                            <label id="label_result" style="word-break: break-all;"></label>
                        </p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Plain text for signing: "123"
        var plain = "MTIz";

        // Pre-hashed data for different algorithms
        var signData_sha1 = 'QL0AFWMIX8NRZTKeof9cXsvbvu8=';
        var signData_sha256 = 'pmWkWSBCL51Bfkhn79xPuKBKHz//H6B+mY6G9/eieuM=';
        var signData_sha384 = 'mgqC8MDPMUcNev/t40BsyaqEEGcVILcnBE7aFbTCVTKptc2Kr5zsSRnXYlW2v7AP';
        var signData_sha512 = 'PJkJr+wlNU1VHa4hWQuybjjVPyFzuNPcPu5MBH56scHri4UQPjvnumE7MbtcnDYhTcnxSkL9ei/bhIVrylxEwg==';


        /**
         * Get the selected algorithm number and adjust sign data payload for PreHash algorithms.
         * @returns {{algNumber: number, signDataPayload: Uint8Array}}
         */
        function getSelectedAlgAndPayload() {
            var signDataPayload = Uint8Array.from(window.atob(plain), c => c.charCodeAt(0));
            var e = document.getElementById('select_alg').value;
            var algNumber;

            switch (e) {
                case "1": algNumber = ALG_RSA2048SHA1; break;
                case "2": algNumber = ALG_RSA2048SHA256; break;
                case "3": algNumber = ALG_RSA2048SHA384; break;
                case "4": algNumber = ALG_RSA2048SHA512; break;
                case "5": algNumber = ALG_RSA2048SHA1_PreHash;
                    signDataPayload = Uint8Array.from(window.atob(signData_sha1), c => c.charCodeAt(0));
                    break;
                case "6": algNumber = ALG_RSA2048SHA256_PreHash;
                    signDataPayload = Uint8Array.from(window.atob(signData_sha256), c => c.charCodeAt(0));
                    break;
                case "7": algNumber = ALG_RSA2048SHA384_PreHash;
                    signDataPayload = Uint8Array.from(window.atob(signData_sha384), c => c.charCodeAt(0));
                    break;
                case "8": algNumber = ALG_RSA2048SHA512_PreHash;
                    signDataPayload = Uint8Array.from(window.atob(signData_sha512), c => c.charCodeAt(0));
                    break;
                case "9": algNumber = ALG_RSA2048SHA1_PSS; break;
                case "10": algNumber = ALG_RSA2048SHA256_PSS; break;
                case "11": algNumber = ALG_RSA2048SHA384_PSS; break;
                case "12": algNumber = ALG_RSA2048SHA512_PSS; break;
                case "13": algNumber = ALG_RSA2048SHA1_PSS_PreHash;
                    signDataPayload = Uint8Array.from(window.atob(signData_sha1), c => c.charCodeAt(0));
                    break;
                case "14": algNumber = ALG_RSA2048SHA256_PSS_PreHash;
                    signDataPayload = Uint8Array.from(window.atob(signData_sha256), c => c.charCodeAt(0));
                    break;
                case "15": algNumber = ALG_RSA2048SHA384_PSS_PreHash;
                    signDataPayload = Uint8Array.from(window.atob(signData_sha384), c => c.charCodeAt(0));
                    break;
                case "16": algNumber = ALG_RSA2048SHA512_PSS_PreHash;
                    signDataPayload = Uint8Array.from(window.atob(signData_sha512), c => c.charCodeAt(0));
                    break;
                case "17": algNumber = ALG_ECDSASHA1; break;
                case "18": algNumber = ALG_ECDSASHA256; break;
                case "19": algNumber = ALG_ECDSASHA384; break;
                case "20": algNumber = ALG_ECDSASHA512; break;
                default: algNumber = ALG_RSA2048SHA256; break;
            }
            return { algNumber, signDataPayload };
        }


        /**
         * Step 1: Request ECDH key agreement from the token.
         * Sends CMD_KeyAgreement (0xE1) with the cert identifier to get the token's EC public key.
         *
         * @param {Uint8Array} command_buf - The TLV command buffer (index or label based)
         * @param {Uint8Array|undefined} sn_buf - Serial number buffer
         * @returns {Promise} resolves with the attestation response containing the token's EC public key
         */
        function requestECDHKeyAgreement(command_buf, sn_buf) {
            var challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);
            var gtheaderbuffer = Uint8Array.from(window.atob(GTheader), c => c.charCodeAt(0));
            var pki_header = new Uint8Array(3);

            var pki_payload_length = command_buf.byteLength + sn_buf.byteLength;
            pki_header[0] = 0xE0; // CMD_ReadCertificate / KeyAgreement
            pki_header[1] = pki_payload_length >> 8;
            pki_header[2] = pki_payload_length;

            var pki_buffer = _appendBuffer(gtheaderbuffer, pki_header);
            pki_buffer = _appendBuffer(pki_buffer, sn_buf);
            pki_buffer = _appendBuffer(pki_buffer, command_buf);

            console.log("requestECDHKeyAgreement:", bufToHex(pki_buffer));

            return navigator.credentials.create({
                'publicKey': {
                    'challenge': challenge,
                    'rp': { 'name': 'GoTrustID Inc.' },
                    'user': {
                        'id': pki_buffer,
                        'name': 'alice@example.com',
                        'displayName': 'SignDataWithPIN'
                    },
                    "authenticatorSelection": {
                        "userVerification": "discouraged",
                        "requireResidentKey": false,
                        "authenticatorAttachment": "cross-platform"
                    },
                    'attestation': "direct",
                    'pubKeyCredParams': [
                        { 'type': 'public-key', 'alg': -7 },
                        { 'type': 'public-key', 'alg': -257 }
                    ]
                }
            });
        }


        /**
         * Step 2: Perform ECDH key derivation and encrypt the PIN.
         *
         * @param {ArrayBuffer} tokenECPublicKeyX - Token's EC public key X coordinate
         * @param {ArrayBuffer} tokenECPublicKeyY - Token's EC public key Y coordinate
         * @param {string} userpin - User's PIN string
         * @returns {Promise<{exportECPublicKeyArray: ArrayBuffer, EncryptedPINArray: ArrayBuffer}>}
         */
        async function deriveAndEncryptPIN(tokenECPublicKeyX, tokenECPublicKeyY, userpin) {
            // Import the token's EC public key
            var externalECPublicKeyX_b64 = base64EncodeURL(tokenECPublicKeyX);
            var externalECPublicKeyY_b64 = base64EncodeURL(tokenECPublicKeyY);

            var externalECPublicKey = await window.crypto.subtle.importKey(
                "jwk",
                {
                    kty: "EC",
                    crv: "P-256",
                    x: externalECPublicKeyX_b64,
                    y: externalECPublicKeyY_b64,
                    ext: true,
                },
                { name: "ECDH", namedCurve: "P-256" },
                true,
                []
            );

            // Generate local ECDH key pair
            var localKeyPair = await window.crypto.subtle.generateKey(
                { name: "ECDH", namedCurve: "P-256" },
                true,
                ["deriveKey", "deriveBits"]
            );

            // Export local public key
            var exportECPublicKeyArray = await window.crypto.subtle.exportKey("raw", localKeyPair.publicKey);
            console.log("exportECPublicKeyArray", bufToHex(exportECPublicKeyArray));

            // Derive shared secret
            var keybits = await window.crypto.subtle.deriveBits(
                {
                    name: "ECDH",
                    namedCurve: "P-256",
                    public: externalECPublicKey,
                },
                localKeyPair.privateKey,
                256
            );

            // SHA-256 of shared secret -> pinEncKey
            var pinEncKeyBytes = await crypto.subtle.digest("SHA-256", new Uint8Array(keybits));
            console.log("pinEncKeyBytes", bufToHex(pinEncKeyBytes));

            var pinEncKey = await crypto.subtle.importKey(
                "raw", pinEncKeyBytes, "aes-cbc", false, ["encrypt"]
            );

            // SHA-256 of PIN -> take first 16 bytes
            var encoder = new TextEncoder();
            var pinData = encoder.encode(userpin);
            var pinDigest = await crypto.subtle.digest("SHA-256", pinData);
            console.log("userpin_digestBytes", bufToHex(pinDigest.slice(0, 16)));

            // AES-CBC encrypt PIN hash
            var iv = new Uint8Array(16);
            var cipherPIN = await crypto.subtle.encrypt(
                { name: "aes-cbc", iv: iv },
                pinEncKey,
                pinDigest.slice(0, 16)
            );

            var EncryptedPINArray = cipherPIN.slice(0, 16);
            console.log("EncryptedPINArray", bufToHex(EncryptedPINArray));

            return { exportECPublicKeyArray, EncryptedPINArray };
        }


        /**
         * Step 3: Build and send the SignWithPIN command (0xE5) via getAssertion.
         *
         * @param {Uint8Array} command_buf - Cert identifier TLV (index or label)
         * @param {Uint8Array} sn_buf - Serial number buffer
         * @param {number} algNumber - Algorithm number
         * @param {Uint8Array} signDataPayload - Data to sign
         * @param {ArrayBuffer} exportECPublicKeyArray - Local EC public key (raw)
         * @param {ArrayBuffer} EncryptedPINArray - Encrypted PIN (16 bytes)
         * @returns {Promise<ArrayBuffer>} The signature response
         */
        function sendSignWithPINCommand(command_buf, sn_buf, algNumber, signDataPayload, exportECPublicKeyArray, EncryptedPINArray) {
            var challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);
            var gtheaderbuffer = Uint8Array.from(window.atob(GTheader), c => c.charCodeAt(0));
            var pki_header = new Uint8Array(3);

            // Algorithm TLV
            var alg_buf = new Uint8Array(5);
            alg_buf[0] = 0xDF;
            alg_buf[1] = 0x03;
            alg_buf[2] = 0x00;
            alg_buf[3] = 0x01;
            alg_buf[4] = algNumber;

            // EC public key TLV
            var ecpubkey_buf = new Uint8Array(4 + exportECPublicKeyArray.byteLength);
            ecpubkey_buf[0] = 0xDF;
            ecpubkey_buf[1] = 0x04;
            ecpubkey_buf[2] = exportECPublicKeyArray.byteLength >> 8;
            ecpubkey_buf[3] = exportECPublicKeyArray.byteLength;
            ecpubkey_buf.set(new Uint8Array(exportECPublicKeyArray), 4);

            // Encrypted PIN TLV
            var encryptedPIN_buf = new Uint8Array(4 + EncryptedPINArray.byteLength);
            encryptedPIN_buf[0] = 0xDF;
            encryptedPIN_buf[1] = 0x05;
            encryptedPIN_buf[2] = EncryptedPINArray.byteLength >> 8;
            encryptedPIN_buf[3] = EncryptedPINArray.byteLength;
            encryptedPIN_buf.set(new Uint8Array(EncryptedPINArray), 4);

            // Sign data TLV
            var signDataBuf = new Uint8Array(4 + signDataPayload.byteLength);
            signDataBuf[0] = 0xDF;
            signDataBuf[1] = 0x06;
            signDataBuf[2] = signDataPayload.byteLength >> 8;
            signDataBuf[3] = signDataPayload.byteLength;
            signDataBuf.set(signDataPayload, 4);

            // Calculate total payload length
            var pki_payload_length = sn_buf.byteLength + command_buf.byteLength + alg_buf.byteLength +
                ecpubkey_buf.byteLength + encryptedPIN_buf.byteLength + signDataBuf.byteLength;

            pki_header[0] = CMD_SignWithPIN; // 0xE5
            pki_header[1] = pki_payload_length >> 8;
            pki_header[2] = pki_payload_length;

            // Build final PKI buffer
            var pki_buffer = _appendBuffer(gtheaderbuffer, pki_header);
            pki_buffer = _appendBuffer(pki_buffer, sn_buf);
            pki_buffer = _appendBuffer(pki_buffer, command_buf);
            pki_buffer = _appendBuffer(pki_buffer, alg_buf);
            pki_buffer = _appendBuffer(pki_buffer, ecpubkey_buf);
            pki_buffer = _appendBuffer(pki_buffer, encryptedPIN_buf);
            pki_buffer = _appendBuffer(pki_buffer, signDataBuf);

            console.log("SignWithPIN command:", bufToHex(pki_buffer));

            var getAssertionChallenge = {
                'challenge': challenge,
                "userVerification": "discouraged",
                timeout: VERIFY_DEFAULT_TIMEOUT,
            };
            var idList = [{
                id: pki_buffer,
                transports: ["usb", "nfc"],
                type: "public-key"
            }];
            getAssertionChallenge.allowCredentials = idList;

            console.log('SignWithPIN getAssertion', getAssertionChallenge);

            return navigator.credentials.get({
                'publicKey': getAssertionChallenge
            }).then((fido) => {
                return fido.response.signature;
            });
        }


        /**
         * Main flow: Sign Data With PIN by Index
         */
        async function signDataWithPINByIndex(certIndex, sn_buf, algNumber, signDataPayload) {
            // Build index command TLV
            var command_buf = new Uint8Array(5);
            command_buf[0] = 0xDF;
            command_buf[1] = 0x02;
            command_buf[2] = 0x00;
            command_buf[3] = 0x01;
            command_buf[4] = certIndex;

            // Step 1: ECDH key agreement
            var ecdhResponse = await requestECDHKeyAgreement(command_buf, sn_buf);

            // Prompt user for PIN
            var userpin = prompt("請輸入 PIN", "");
            if (userpin == null || userpin.length === 0) {
                alert("PIN 不能為空");
                return null;
            }

            // Parse token's EC public key from attestation response
            var attestationObject = CBOR.decode(ecdhResponse.response.attestationObject);
            var authData = parseAuthData(attestationObject.authData);
            var publicKey = CBOR.decode(authData.COSEPublicKey.buffer);
            var tokenECPublicKeyX = Object.values(publicKey)[3];
            var tokenECPublicKeyY = Object.values(publicKey)[4];
            console.log('Token EC X:', bufToHex(tokenECPublicKeyX));
            console.log('Token EC Y:', bufToHex(tokenECPublicKeyY));

            // Step 2: Derive shared secret and encrypt PIN
            var pinResult = await deriveAndEncryptPIN(tokenECPublicKeyX, tokenECPublicKeyY, userpin);

            // Step 3: Send SignWithPIN command
            var signatureBuffer = await sendSignWithPINCommand(
                command_buf, sn_buf, algNumber, signDataPayload,
                pinResult.exportECPublicKeyArray, pinResult.EncryptedPINArray
            );

            return signatureBuffer;
        }


        /**
         * Main flow: Sign Data With PIN by Label
         */
        async function signDataWithPINByLabel(label, sn_buf, algNumber, signDataPayload) {
            // Build label command TLV
            var labelBytes = toUTF8Array(label);
            var command_buf = new Uint8Array(labelBytes.length + 4);
            command_buf[0] = 0xDF;
            command_buf[1] = 0x01;
            command_buf[2] = labelBytes.length >> 8;
            command_buf[3] = labelBytes.length;
            command_buf.set(labelBytes, 4);

            // Step 1: ECDH key agreement
            var ecdhResponse = await requestECDHKeyAgreement(command_buf, sn_buf);

            // Prompt user for PIN
            var userpin = prompt("請輸入 PIN", "");
            if (userpin == null || userpin.length === 0) {
                alert("PIN 不能為空");
                return null;
            }

            // Parse token's EC public key from attestation response
            var attestationObject = CBOR.decode(ecdhResponse.response.attestationObject);
            var authData = parseAuthData(attestationObject.authData);
            var publicKey = CBOR.decode(authData.COSEPublicKey.buffer);
            var tokenECPublicKeyX = Object.values(publicKey)[3];
            var tokenECPublicKeyY = Object.values(publicKey)[4];
            console.log('Token EC X:', bufToHex(tokenECPublicKeyX));
            console.log('Token EC Y:', bufToHex(tokenECPublicKeyY));

            // Step 2: Derive shared secret and encrypt PIN
            var pinResult = await deriveAndEncryptPIN(tokenECPublicKeyX, tokenECPublicKeyY, userpin);

            // Step 3: Send SignWithPIN command
            var signatureBuffer = await sendSignWithPINCommand(
                command_buf, sn_buf, algNumber, signDataPayload,
                pinResult.exportECPublicKeyArray, pinResult.EncryptedPINArray
            );

            return signatureBuffer;
        }


        /**
         * Handle signature response - display result or error
         */
        function handleSignatureResponse(signatureBuffer) {
            if (signatureBuffer == null) return;

            // Check if response contains GoTrust header (error response)
            if (isErrorMessage(signatureBuffer) === 1) {
                showSignMessage(signatureBuffer);
            } else {
                // Parse using GTIdemJs
                var gtidem = new GTIdemJs();
                gtidem.parsePKIoverFIDOResponse(signatureBuffer, CMD_SignWithPIN);

                if (gtidem.statusCode == CTAP1_ERR_SUCCESS) {
                    var strResult = "";
                    if (gtidem.sn != undefined) {
                        strResult += "序號: " + ConverSNFormat(gtidem.sn) + "\n";
                    }
                    var sig = new Uint8Array(gtidem.signature);
                    console.log("Signature:", bufToHex(sig.buffer));
                    var str = String.fromCharCode.apply(null, sig);
                    strResult += "簽名:\n" + btoa(str);
                    alert(strResult);
                    document.getElementById('label_result').innerText = "Signature (Base64): " + btoa(str);
                } else {
                    alert(showFIDOErrorMessage(gtidem));
                }
            }
        }


        // ==================== Event Handlers ====================

        // Sign by Index button
        document.getElementById('form_sign_withpin_index_btn').addEventListener('submit', function (event) {
            event.preventDefault();

            var token_sn = document.getElementById('form_token_sn').token_sn.value;
            var certIndex = parseInt(document.getElementById('form_index').certIndex.value);
            var { algNumber, signDataPayload } = getSelectedAlgAndPayload();

            var sn_buf;
            if (token_sn.length !== 0) {
                var sn_raw = hexStringToArrayBuffer(token_sn);
                sn_buf = new Uint8Array(4 + sn_raw.byteLength);
                sn_buf[0] = 0xDF;
                sn_buf[1] = 0x20;
                sn_buf[2] = sn_raw.byteLength >> 8;
                sn_buf[3] = sn_raw.byteLength;
                sn_buf.set(sn_raw, 4);
            } else {
                sn_buf = new Uint8Array(0);
            }

            console.log('SignDataWithPIN by Index:', certIndex, 'alg:', algNumber);

            signDataWithPINByIndex(certIndex, sn_buf, algNumber, signDataPayload)
                .then(handleSignatureResponse)
                .catch(function (error) {
                    alert(error);
                    console.log('FAIL', error);
                });
        });


        // Sign by Label button
        document.getElementById('form_sign_withpin_label_btn').addEventListener('submit', function (event) {
            event.preventDefault();

            var token_sn = document.getElementById('form_token_sn').token_sn.value;
            var label = document.getElementById('form_label').certlabel.value;
            var { algNumber, signDataPayload } = getSelectedAlgAndPayload();

            if (label.length === 0) {
                alert("Label 不能為空");
                return;
            }

            var sn_buf;
            if (token_sn.length !== 0) {
                var sn_raw = hexStringToArrayBuffer(token_sn);
                sn_buf = new Uint8Array(4 + sn_raw.byteLength);
                sn_buf[0] = 0xDF;
                sn_buf[1] = 0x20;
                sn_buf[2] = sn_raw.byteLength >> 8;
                sn_buf[3] = sn_raw.byteLength;
                sn_buf.set(sn_raw, 4);
            } else {
                sn_buf = new Uint8Array(0);
            }

            console.log('SignDataWithPIN by Label:', label, 'alg:', algNumber);

            signDataWithPINByLabel(label, sn_buf, algNumber, signDataPayload)
                .then(handleSignatureResponse)
                .catch(function (error) {
                    alert(error);
                    console.log('FAIL', error);
                });
        });
    </script>

</body>

</html>
