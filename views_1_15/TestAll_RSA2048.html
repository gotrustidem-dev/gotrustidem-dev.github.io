        <div class="form-group" style="margin-top:12px;">

    <!-- Step 1: 建立 CSR -->
    <div class="step-card" id="card_step1">
        <div class="step-header">

            <span class="step-title">建立 CSR (Certificate Signing Request)</span>
            <span class="status-indicator status-pending" id="step1_status">待執行</span>

        <div class="form-group">
            <label>CSR Common Name (CN)</label>
            <input type="text" id="input_common_name" value="0123456789-AA-C12345abcdf">
            <div class="hint">若不指定將使用預設值</div>
        </div>

        <div class="form-group">
            <label style="display:inline;">
                <input type="checkbox" id="checkbox_clear_token"> Clear token before keygen

        </div>

        <button class="btn-action" onclick="doGenCSR()">🔑 產生 RSA2048 CSR</button>

            <label>Key Handle (自動產生)</label>

        </div>

        <div class="form-group">
            <label>CSR 結果</label>

    <!-- Step 2: 匯入憑證 -->
    <div class="step-card" id="card_step2">
        <div class="step-header">
            <div class="step-number" id="step2_num">2</div>
            <span class="step-title">匯入憑證 (Import Certificate)</span>

                        <option value="ALG_RSA2048SHA256" selected>ALG_RSA2048SHA256</option>
                        <option value="ALG_RSA2048SHA384">ALG_RSA2048SHA384</option>
                        <option value="ALG_RSA2048SHA512">ALG_RSA2048SHA512</option>

                    </optgroup>
                    <optgroup label="RSA PSS (Token 做 Hash)">

                    </optgroup>
                    <optgroup label="RSA PSS PreHash (網頁做 Hash)">

                    </optgroup>
                </select>

        </div>

        <div class="form-group">

            <div class="hint">預設為 "1234567890abcdef1234567890abcdef" 的 Base64</div>
        </div>

        <button class="btn-action btn-sign" onclick="doSignData()">✍️ 產生簽名</button>

        <div class="form-group" style="margin-top:16px;">

            <textarea id="output_signature" rows="4" readonly style="background:#f0f0f0;"
                placeholder="簽名後自動填入"></textarea>
        </div>
    </div>

    <!-- Log -->

        // ALG mapping
        var ALG_MAP = {
            'ALG_RSA2048SHA1': ALG_RSA2048SHA1,
            'ALG_RSA2048SHA256': ALG_RSA2048SHA256,
            'ALG_RSA2048SHA384': ALG_RSA2048SHA384,

        // ============================================================
        // Utility
        // ============================================================
        function log(msg) {
            var area = document.getElementById('log_area');
            var now = new Date().toLocaleTimeString();
            area.value += '[' + now + '] ' + msg + '\n';
            area.scrollTop = area.scrollHeight;
            console.log(msg);
        }

        function clearLog() {
            document.getElementById('log_area').value = '';
        }

        function setStepStatus(stepNum, status) {
            var el = document.getElementById('step' + stepNum + '_status');
            var numEl = document.getElementById('step' + stepNum + '_num');
            el.className = 'status-indicator';
            if (status === 'ok') {
                el.className += ' status-ok';
                el.textContent = '✅ 成功';
                numEl.className = 'step-number done';
            } else if (status === 'fail') {
                el.className += ' status-fail';
                el.textContent = '❌ 失敗';
            } else {
                el.className += ' status-pending';
                el.textContent = '⏳ 執行中...';
            }
        }

        function getTokenSN() {
            var sn = document.getElementById('input_token_sn').value.trim();
            if (sn.length === 0) return undefined;
            return hexStringToArrayBuffer(sn);
        }

        // ============================================================
        // Step 1: 產生 CSR
        // ============================================================
        function doGenCSR() {
            setStepStatus(1, 'pending');
            log('=== Step 1: 產生 RSA2048 CSR ===');

            var bToken_sn = getTokenSN();
            var common_name = document.getElementById('input_common_name').value.trim();
            var isClear = document.getElementById('checkbox_clear_token').checked;

            var bCommonName = undefined;
            if (common_name.length !== 0) {
                bCommonName = toUTF8Array(common_name);
            }

            log('Common Name: ' + (common_name || '(預設)'));
            log('Clear token before keygen: ' + isClear);

            GTIDEM_SetName('TestAll');

            GTIDEM_GenRSA2048CSR(bToken_sn, bCommonName, isClear).then(function (response) {
                if (response.statusCode == CTAP1_ERR_SUCCESS) {
                    // SN
                    if (response.sn != undefined) {
                        log('載具序號: ' + ConverSNFormat(response.sn));
                    }

                    // CSR
                    var strCSR = "-----BEGIN CERTIFICATE REQUEST-----\n" +
                        btoa(String.fromCharCode.apply(null, new Uint8Array(response.csr))) +
                        "\n-----END CERTIFICATE REQUEST-----\n";
                    document.getElementById('output_csr').value = strCSR;
                    document.getElementById('input_csr_for_sign').value = strCSR;
                    log('CSR 產生成功');

                    // Key Handle
                    var keyHandleHex = bufToHex(new Uint8Array(response.keyhandle).buffer);
                    document.getElementById('output_key_handle').value = keyHandleHex;
                    document.getElementById('input_import_key_handle').value = keyHandleHex;
                    document.getElementById('input_sign_key_handle').value = keyHandleHex;
                    log('Key Handle: ' + keyHandleHex);

                    setStepStatus(1, 'ok');
                } else {
                    log('ERROR: ' + showFIDOErrorMessage(response));
                    setStepStatus(1, 'fail');
                    alert(showFIDOErrorMessage(response));
                }
            }).catch(function (error) {
                log('FAIL: ' + error);
                setStepStatus(1, 'fail');
                alert(error);
            });
        }

        // ============================================================
        // Step 2a: 匯入測試憑證
        // ============================================================
        function doImportTestCert() {
            setStepStatus(2, 'pending');
            log('=== Step 2: 匯入測試憑證 ===');

            var bToken_sn = getTokenSN();
            var key_handle = document.getElementById('input_import_key_handle').value.trim();
            var key_id = document.getElementById('input_import_key_id').value.trim();

            if (key_handle.length === 0) {
                alert('請先執行 Step 1 產生 CSR，或手動填入 Key Handle');
                setStepStatus(2, 'fail');
                return;
            }

            var bKeyHandle = hexStringToArrayBuffer(key_handle);
            var bHexCert = Uint8Array.from(window.atob(testBigCertificate), function (c) { return c.charCodeAt(0); });

            var bKeyID;
            if (key_id.length !== 0) {
                bKeyID = toUTF8Array(key_id);
            } else {
                bKeyID = bKeyHandle;
            }

            log('Key Handle: ' + key_handle);
            log('Key ID: ' + (key_id || '(使用 Key Handle)'));

            GTIDEM_ImportCertificate(bToken_sn, bKeyHandle, bKeyID, bHexCert, undefined).then(function (response) {
                if (response.statusCode == CTAP1_ERR_SUCCESS) {
                    var msg = '匯入測試憑證完成';
                    if (response.sn != undefined) {
                        msg += ' | 載具序號: ' + ConverSNFormat(response.sn);
                    }
                    if (response.signature != undefined) {
                        msg += '\nSignature: ' + btoa(String.fromCharCode.apply(null, new Uint8Array(response.signature)));
                    }
                    log(msg);
                    setStepStatus(2, 'ok');
                    alert(msg);
                } else {
                    log('ERROR: ' + showFIDOErrorMessage(response));
                    setStepStatus(2, 'fail');
                    alert(showFIDOErrorMessage(response));
                }
            }).catch(function (error) {
                log('FAIL: ' + error);
                setStepStatus(2, 'fail');
                alert(error);
            });
        }

        // ============================================================
        // Step 2b: 瀏覽器端簽發憑證並匯入 (使用 forge.js)
        // ============================================================
        var cachedTestCA = null;

        function getOrCreateTestCA() {
            return new Promise(function (resolve, reject) {
                if (cachedTestCA) {
                    log('使用已快取的測試 CA');
                    resolve(cachedTestCA);
                    return;
                }
                log('首次使用，產生瀏覽器端測試 CA 金鑰對 (約需數秒)...');
                forge.pki.rsa.generateKeyPair({ bits: 2048, workers: 2 }, function (err, caKeys) {
                    if (err) { reject(err); return; }

                    var caCert = forge.pki.createCertificate();
                    caCert.publicKey = caKeys.publicKey;
                    caCert.serialNumber = '01';
                    caCert.validity.notBefore = new Date();
                    caCert.validity.notAfter = new Date();
                    caCert.validity.notAfter.setFullYear(caCert.validity.notAfter.getFullYear() + 10);

                    var caAttrs = [
                        { name: 'commonName', value: 'Browser Test CA' },
                        { name: 'organizationName', value: 'GoTrustIdem GitHub Pages Test' },
                        { name: 'countryName', value: 'TW' }
                    ];
                    caCert.setSubject(caAttrs);
                    caCert.setIssuer(caAttrs);
                    caCert.setExtensions([
                        { name: 'basicConstraints', cA: true },
                        { name: 'keyUsage', keyCertSign: true, cRLSign: true }
                    ]);
                    caCert.sign(caKeys.privateKey, forge.md.sha256.create());

                    cachedTestCA = { keys: caKeys, cert: caCert, attrs: caAttrs };
                    log('測試 CA 產生完成: CN=Browser Test CA');
                    resolve(cachedTestCA);
                });
            });
        }

        async function doRequestRealCert() {

                alert('請先執行 Step 1 產生 CSR');
                setStepStatus(2, 'fail');
                return;
            }

            try {
                // 1) 解析 CSR
                log('解析 CSR...');
                var csr = forge.pki.certificationRequestFromPem(csrPem);
                var cnField = csr.subject.getField('CN');
                log('CSR Subject CN: ' + (cnField ? cnField.value : '(無)'));

                // 2) 取得或產生測試 CA
                var ca = await getOrCreateTestCA();

                // 3) 用測試 CA 簽發使用者憑證
                log('使用測試 CA 簽發使用者憑證...');
                var cert = forge.pki.createCertificate();
                cert.publicKey = csr.publicKey;
                cert.serialNumber = forge.util.bytesToHex(forge.random.getBytesSync(16));
                cert.validity.notBefore = new Date();
                cert.validity.notAfter = new Date();
                cert.validity.notAfter.setFullYear(cert.validity.notAfter.getFullYear() + 1);

                cert.setSubject(csr.subject.attributes);
                cert.setIssuer(ca.attrs);
                cert.setExtensions([
                    { name: 'basicConstraints', cA: false },
                    { name: 'keyUsage', digitalSignature: true, nonRepudiation: true },
                    { name: 'extKeyUsage', clientAuth: true }
                ]);
                cert.sign(ca.keys.privateKey, forge.md.sha256.create());

                log('憑證簽發成功');
                log('  Subject: ' + (cert.subject.getField('CN') ? cert.subject.getField('CN').value : ''));
                log('  Issuer : ' + cert.issuer.getField('CN').value);
                log('  Serial : ' + cert.serialNumber);
                log('  有效期 : ' + cert.validity.notBefore.toLocaleDateString() + ' ~ ' + cert.validity.notAfter.toLocaleDateString());

                // 4) 轉換為 DER 格式
                var certAsn1 = forge.pki.certificateToAsn1(cert);
                var certDer = forge.asn1.toDer(certAsn1);
                var certBytes = new Uint8Array(certDer.length());
                for (var i = 0; i < certDer.length(); i++) {
                    certBytes[i] = certDer.at(i);
                }
                log('憑證大小: ' + certBytes.length + ' bytes，準備匯入 Token...');

                // 5) 匯入 Token
                var bToken_sn = getTokenSN();
                var key_handle = document.getElementById('input_import_key_handle').value.trim();
                var key_id = document.getElementById('input_import_key_id').value.trim();

                if (key_handle.length === 0) {
                    log('ERROR: Key Handle 為空');
                    setStepStatus(2, 'fail');
                    alert('請先執行 Step 1，或手動填入 Key Handle');
                    return;
                }

                var bKeyHandle = hexStringToArrayBuffer(key_handle);
                var bKeyID;
                if (key_id.length !== 0) {
                    bKeyID = toUTF8Array(key_id);
                } else {
                    bKeyID = bKeyHandle;
                }

                var response = await GTIDEM_ImportCertificate(bToken_sn, bKeyHandle, bKeyID, certBytes, undefined);

                if (response.statusCode == CTAP1_ERR_SUCCESS) {
                    var msg = '瀏覽器簽發憑證匯入完成';
                    if (response.sn != undefined) {
                        msg += ' | 載具序號: ' + ConverSNFormat(response.sn);
                    }
                    if (response.signature != undefined) {
                        msg += '\nSignature: ' + btoa(String.fromCharCode.apply(null, new Uint8Array(response.signature)));
                    }
                    log(msg);
                    setStepStatus(2, 'ok');
                    alert(msg);
                } else {
                    log('ERROR: ' + showFIDOErrorMessage(response));
                    setStepStatus(2, 'fail');
                    alert(showFIDOErrorMessage(response));
                }
            } catch (error) {
                log('FAIL: ' + error);
                setStepStatus(2, 'fail');
                alert('憑證簽發失敗: ' + error);
            }
        }

        // ============================================================
        // Step 3: 建立簽名
        // ============================================================
        async function doSignData() {
            setStepStatus(3, 'pending');
            log('=== Step 3: 建立簽名 ===');

            var bToken_sn = getTokenSN();
            var keyHandleHex = document.getElementById('input_sign_key_handle').value.trim();

            if (keyHandleHex.length === 0) {
                alert('請先執行 Step 1 產生 CSR，或手動填入 Key Handle');
                setStepStatus(3, 'fail');
                return;
            }

            var bKeyHandle = hexStringToArrayBuffer(keyHandleHex);
            var algName = document.getElementById('select_sign_alg').value;
            var algNumber = ALG_MAP[algName];

            log('演算法: ' + algName + ' (0x' + algNumber.toString(16).padStart(2, '0') + ')');
            log('Key Handle: ' + keyHandleHex);

            var signDataB64 = document.getElementById('input_sign_data').value.trim();
            var signDataPayload = Uint8Array.from(window.atob(signDataB64), function (c) { return c.charCodeAt(0); });

            // 判斷是否為 PreHash 演算法
            var isPreHash = algName.indexOf('PreHash') !== -1;

            var finalPayload = signDataPayload;

            if (isPreHash) {
                log('PreHash 模式：網頁端先做 SHA-256 Hash...');
                try {
                    var hashBuffer = await crypto.subtle.digest("SHA-256", signDataPayload);
                    finalPayload = new Uint8Array(hashBuffer);
                    log('Hash 結果: ' + bufToHex(hashBuffer));
                } catch (e) {
                    log('Hash 失敗: ' + e);
                    setStepStatus(3, 'fail');
                    return;
                }
            } else {
                log('非 PreHash 模式：原始資料直接傳給 Token 做 Hash + 簽名');
            }

            log('傳送資料長度: ' + finalPayload.byteLength + ' bytes');

            try {
                var value = await GTIDEM_SignDataByLabel(bKeyHandle, bToken_sn, algNumber, finalPayload);

                if (value.statusCode == CTAP1_ERR_SUCCESS) {
                    var sigB64 = btoa(String.fromCharCode.apply(null, new Uint8Array(value.signature)));
                    document.getElementById('output_signature').value = sigB64;

                    var msg = '簽名成功';
                    if (value.sn != undefined) {
                        msg += ' | 載具序號: ' + ConverSNFormat(value.sn);
                    }
                    log(msg);
                    log('Signature (Base64): ' + sigB64);
                    setStepStatus(3, 'ok');
                    alert(msg);
                } else {
                    log('ERROR: ' + showFIDOErrorMessage(value));
                    setStepStatus(3, 'fail');
                    alert(showFIDOErrorMessage(value));
                }
            } catch (error) {
                log('FAIL: ' + error);
                setStepStatus(3, 'fail');
                alert(error);
            }
        }
    </script>
