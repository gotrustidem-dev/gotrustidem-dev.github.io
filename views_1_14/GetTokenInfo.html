<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 資訊查詢 - IdemKey+ v1.14</title>
    <script type="module" src="../utils/PKIoverFIDO_1_14.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-700: #495057;
            --gray-900: #212529;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 2em;
        }

        .header .subtitle {
            color: var(--gray-700);
            font-size: 0.95em;
        }

        .back-link {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--gray-700);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--gray-300);
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
            transform: none;
        }

        .info-grid {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        .info-item {
            background: var(--gray-100);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .info-item .label {
            font-size: 0.85em;
            color: var(--gray-700);
            margin-bottom: 5px;
        }

        .info-item .value {
            font-size: 1.1em;
            color: var(--gray-900);
            font-weight: 500;
            word-break: break-all;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid var(--success);
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid var(--danger);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid var(--gray-300);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../IdemKeyPlus_1_14.html" class="back-link">← 返回主頁</a>

        <div class="header">
            <h1>🔍 Token 資訊查詢</h1>
            <p class="subtitle">查看您的 IdemKey+ 裝置資訊和狀態</p>
        </div>

        <div class="card">
            <div class="alert alert-info">
                ℹ️ 請確保您的 IdemKey+ 裝置已連接，然後點擊「取得 Token 資訊」按鈕。
            </div>

            <div class="form-group">
                <label for="token_sn">Token 序號</label>
                <input type="text" id="token_sn" placeholder="將自動顯示裝置序號" readonly>
            </div>

            <button id="getInfoBtn" class="btn btn-primary">
                🔍 取得 Token 資訊
            </button>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px; color: var(--gray-700);">正在讀取裝置資訊...</p>
            </div>

            <div id="tokenInfo" style="display: none;">
                <h3 style="margin: 30px 0 15px; color: var(--gray-900);">📊 裝置詳細資訊</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="label">📟 韌體版本</div>
                        <div class="value" id="info_fw">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">💿 軟體版本</div>
                        <div class="value" id="info_sw">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">🔢 PIN 剩餘次數</div>
                        <div class="value" id="info_pin_retries">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">📇 憑證數量</div>
                        <div class="value" id="info_credentials">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">🎲 隨機數</div>
                        <div class="value" id="info_random">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">🔑 EC 公鑰</div>
                        <div class="value" id="info_ecpublic" style="font-size: 0.9em;">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">🚩 旗標</div>
                        <div class="value" id="info_flags">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">🔐 SO PIN 剩餘次數</div>
                        <div class="value" id="info_sopin_retries">-</div>
                    </div>
                </div>
            </div>

            <div id="errorMsg" style="display: none; margin-top: 20px;"></div>
        </div>
    </div>

    <script type="module">
        import { createIdemKeyAPI } from '../utils/PKIoverFIDO_1_14.js';

        const api = createIdemKeyAPI();
        const getInfoBtn = document.getElementById('getInfoBtn');
        const loading = document.getElementById('loading');
        const tokenInfo = document.getElementById('tokenInfo');
        const errorMsg = document.getElementById('errorMsg');

        getInfoBtn.addEventListener('click', async () => {
            try {
                getInfoBtn.disabled = true;
                loading.classList.add('active');
                tokenInfo.style.display = 'none';
                errorMsg.style.display = 'none';

                const response = await api.getTokenInfo();

                if (response.isSuccess()) {
                    const data = response.data;
                    
                    document.getElementById('token_sn').value = data.serialNumber || 'N/A';
                    document.getElementById('info_fw').textContent = data.firmwareVersion || 'N/A';
                    document.getElementById('info_sw').textContent = data.softwareVersion || 'N/A';
                    document.getElementById('info_pin_retries').textContent = data.pinRetries !== undefined ? data.pinRetries : 'N/A';
                    document.getElementById('info_credentials').textContent = data.credentialsCount !== undefined ? data.credentialsCount : 'N/A';
                    document.getElementById('info_random').textContent = data.randomNumber || 'N/A';
                    document.getElementById('info_ecpublic').textContent = data.ecPublicKey || 'N/A';
                    document.getElementById('info_flags').textContent = data.flags || 'N/A';
                    document.getElementById('info_sopin_retries').textContent = data.sopinRetries !== undefined ? data.sopinRetries : 'N/A';

                    tokenInfo.style.display = 'block';
                } else {
                    throw new Error(response.error || '取得資訊失敗');
                }
            } catch (error) {
                errorMsg.className = 'alert alert-danger';
                errorMsg.innerHTML = `❌ 錯誤：${error.message}`;
                errorMsg.style.display = 'block';
                console.error('Error:', error);
            } finally {
                loading.classList.remove('active');
                getInfoBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
